<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Vinnu 🎉</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:Poppins;
    background: linear-gradient(135deg, #6a11cb, #2575fc, #00c6ff);
    overflow-x:hidden;
    color:white;
}

/* HERO */
.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

h1{
    font-family:Dancing Script;
    font-size:4.5rem;
    text-shadow:0 0 20px white;
}

.btn{
    padding:15px 30px;
    border:none;
    border-radius:25px;
    background:white;
    color:#2575fc;
    font-weight:bold;
    cursor:pointer;
    margin-top:20px;
}

/* GIFT */
.gift{
    font-size:4rem;
    cursor:pointer;
    margin-top:20px;
    animation:bounce 1.5s infinite;
}

@keyframes bounce{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
}

/* SURPRISE */
.surprise{
    display:none;
    margin-top:20px;
    padding:20px;
    background:rgba(255,255,255,0.2);
    border-radius:15px;
}

/* HEARTS */
.heart{
    position:fixed;
    top:-20px;
    font-size:20px;
    animation:fall linear forwards;
}

@keyframes fall{
    to{transform:translateY(110vh);}
}

/* BALLOONS */
.balloon{
    position:fixed;
    bottom:-100px;
    font-size:50px;
    animation:rise linear forwards;
}

@keyframes rise{
    to{transform:translateY(-120vh);}
}

/* CANVAS */
canvas{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
}

</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div class="hero">

<h1>🎉 Happy Birthday Vinnu 🎉</h1>

<p>A celebration made with love 💙</p>

<button class="btn" onclick="start()">Start Celebration 🎊</button>

<div class="gift" onclick="openGift()">🎁</div>

<div class="surprise" id="surprise">
💙 Happy Birthday Vinnu 💙<br><br>
You are truly special ✨
</div>

</div>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_d1a8e6c8b7.mp3">
</audio>

<script>

let ctx = document.getElementById("canvas").getContext("2d");
let canvas = document.getElementById("canvas");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

/* START */
function start(){
    document.getElementById("music").play();
    setInterval(confetti, 150);
    setInterval(createHeart, 250);
    setInterval(createBalloon, 800);
    fireworkLoop();
}

/* GIFT */
function openGift(){
    document.getElementById("surprise").style.display="block";
}

/* HEARTS */
function createHeart(){
    let h = document.createElement("div");
    h.className="heart";
    h.innerHTML="💙";
    h.style.left=Math.random()*100+"vw";
    h.style.animationDuration=(Math.random()*3+3)+"s";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),6000);
}

/* BALLOONS */
function createBalloon(){
    let b=document.createElement("div");
    b.className="balloon";
    b.innerHTML="🎈";
    b.style.left=Math.random()*100+"vw";
    b.style.animationDuration=(Math.random()*5+6)+"s";
    document.body.appendChild(b);
    setTimeout(()=>b.remove(),10000);
}

/* CONFETTI */
function confetti(){
    let x = Math.random()*canvas.width;
    let y = 0;

    let size = Math.random()*6+4;

    ctx.fillStyle = "white";
    ctx.fillRect(x,y,size,size);

    setTimeout(()=>{
        ctx.clearRect(0,0,canvas.width,canvas.height);
    },2000);
}

/* FIREWORKS */
function fireworkLoop(){
    setInterval(()=>{
        for(let i=0;i<20;i++){
            ctx.fillStyle = "#00c6ff";
            ctx.beginPath();
            ctx.arc(
                Math.random()*canvas.width,
                Math.random()*canvas.height/2,
                2,
                0,
                Math.PI*2
            );
            ctx.fill();
        }
    },400);
}

</script>

</body>
</html>
